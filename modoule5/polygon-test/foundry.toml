[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.19"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
mumbai = "https://rpc.ankr.com/polygon_mumbai"
polygon = "https://rpc.ankr.com/polygon"

# Gas price configuration for different networks
[profile.mumbai]
gas_price = 30_000_000_000  # 30 gwei for Mumbai testnet

[profile.polygon]
gas_price = 50_000_000_000  # 50 gwei for Polygon mainnet

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
