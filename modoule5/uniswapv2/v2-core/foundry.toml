[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.19"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.polygon]
gas_price = 30_000_000_000  # 30 gwei for Polygon

[rpc_endpoints]
base_mainnet = "https://mainnet.base.org"
base_sepolia = "https://sepolia.base.org"
polygon = "https://polygon-rpc.com"
polygon_mumbai = "https://rpc-mumbai.maticvigil.com"

