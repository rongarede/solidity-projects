<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 定义渐变色 -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="#F8FAFC" />
  
  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1F2937">
    Uniswap V2 前端系统架构
  </text>
  
  <!-- 用户层 -->
  <g id="user-layer">
    <rect x="50" y="80" width="150" height="80" rx="10" fill="url(#blueGradient)" stroke="#1E40AF" stroke-width="2"/>
    <text x="125" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">用户界面</text>
    <text x="125" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">React + Next.js</text>
    <text x="125" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">AddLiquidity组件</text>
  </g>
  
  <!-- 钱包层 -->
  <g id="wallet-layer">
    <rect x="250" y="80" width="150" height="80" rx="10" fill="url(#greenGradient)" stroke="#059669" stroke-width="2"/>
    <text x="325" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Web3钱包</text>
    <text x="325" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">MetaMask</text>
    <text x="325" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">WalletConnect</text>
  </g>
  
  <!-- Web3库层 -->
  <g id="web3-layer">
    <rect x="450" y="80" width="150" height="80" rx="10" fill="url(#purpleGradient)" stroke="#7C3AED" stroke-width="2"/>
    <text x="525" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Web3库</text>
    <text x="525" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Wagmi + Viem</text>
    <text x="525" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">useWriteContract</text>
  </g>
  
  <!-- 区块链层 -->
  <g id="blockchain-layer">
    <rect x="600" y="80" width="150" height="80" rx="10" fill="url(#orangeGradient)" stroke="#D97706" stroke-width="2"/>
    <text x="675" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Base链</text>
    <text x="675" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">RPC节点</text>
    <text x="675" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">智能合约</text>
  </g>
  
  <!-- 智能合约组件 -->
  <g id="contracts">
    <!-- Factory合约 -->
    <rect x="50" y="220" width="170" height="100" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="135" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1E40AF">UniswapV2Factory</text>
    <text x="65" y="265" font-family="Arial, sans-serif" font-size="12" fill="#374151">• createPair()</text>
    <text x="65" y="280" font-family="Arial, sans-serif" font-size="12" fill="#374151">• getPair()</text>
    <text x="65" y="295" font-family="Arial, sans-serif" font-size="12" fill="#374151">地址: 0x2E28...d571</text>
    
    <!-- Router合约 -->
    <rect x="250" y="220" width="170" height="100" rx="8" fill="#F0FDF4" stroke="#10B981" stroke-width="2"/>
    <text x="335" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#059669">UniswapV2Router02</text>
    <text x="265" y="265" font-family="Arial, sans-serif" font-size="12" fill="#374151">• addLiquidity()</text>
    <text x="265" y="280" font-family="Arial, sans-serif" font-size="12" fill="#374151">• addLiquidityETH()</text>
    <text x="265" y="295" font-family="Arial, sans-serif" font-size="12" fill="#374151">地址: 0xcEc7...bC72</text>
    
    <!-- Pair合约 -->
    <rect x="450" y="220" width="170" height="100" rx="8" fill="#FAF5FF" stroke="#8B5CF6" stroke-width="2"/>
    <text x="535" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#7C3AED">UniswapV2Pair</text>
    <text x="465" y="265" font-family="Arial, sans-serif" font-size="12" fill="#374151">• mint()</text>
    <text x="465" y="280" font-family="Arial, sans-serif" font-size="12" fill="#374151">• getReserves()</text>
    <text x="465" y="295" font-family="Arial, sans-serif" font-size="12" fill="#374151">动态创建</text>
    
    <!-- ERC20合约 -->
    <rect x="650" y="220" width="100" height="100" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
    <text x="700" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#D97706">ERC20</text>
    <text x="665" y="265" font-family="Arial, sans-serif" font-size="12" fill="#374151">• approve()</text>
    <text x="665" y="280" font-family="Arial, sans-serif" font-size="12" fill="#374151">• transfer()</text>
    <text x="665" y="295" font-family="Arial, sans-serif" font-size="12" fill="#374151">代币合约</text>
  </g>
  
  <!-- 数据流箭头 -->
  <g id="arrows">
    <!-- 用户 -> 钱包 -->
    <path d="M 200 120 L 250 120" stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="225" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">交易请求</text>
    
    <!-- 钱包 -> Web3库 -->
    <path d="M 400 120 L 450 120" stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="425" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">签名</text>
    
    <!-- Web3库 -> 区块链 -->
    <path d="M 600 120 L 600 120" stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="575" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">RPC调用</text>
    
    <!-- 区块链 -> 合约调用 -->
    <path d="M 675 160 L 675 190" stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- 合约间调用关系 -->
    <path d="M 220 270 L 250 270" stroke="#DC2626" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="235" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#DC2626">创建交易对</text>
    
    <path d="M 420 270 L 450 270" stroke="#DC2626" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="435" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#DC2626">铸造LP</text>
    
    <path d="M 620 270 L 650 270" stroke="#DC2626" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="635" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#DC2626">代币授权</text>
  </g>
  
  <!-- 状态管理 -->
  <g id="state-management">
    <rect x="50" y="380" width="700" height="80" rx="10" fill="#F1F5F9" stroke="#64748B" stroke-width="2"/>
    <text x="400" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#334155">前端状态管理</text>
    
    <rect x="80" y="420" width="120" height="30" rx="5" fill="#EFF6FF" stroke="#3B82F6"/>
    <text x="140" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E40AF">Zustand Store</text>
    
    <rect x="220" y="420" width="120" height="30" rx="5" fill="#F0FDF4" stroke="#10B981"/>
    <text x="280" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#059669">React Hooks</text>
    
    <rect x="360" y="420" width="120" height="30" rx="5" fill="#FAF5FF" stroke="#8B5CF6"/>
    <text x="420" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7C3AED">Web3 State</text>
    
    <rect x="500" y="420" width="120" height="30" rx="5" fill="#FFFBEB" stroke="#F59E0B"/>
    <text x="560" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D97706">Error Logger</text>
    
    <rect x="640" y="420" width="80" height="30" rx="5" fill="#FEF2F2" stroke="#EF4444"/>
    <text x="680" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#DC2626">Toast UI</text>
  </g>
  
  <!-- 关键特性标注 -->
  <g id="features">
    <text x="50" y="520" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">关键特性：</text>
    <text x="50" y="540" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">• 类型安全的智能合约调用 (Wagmi + TypeScript)</text>
    <text x="50" y="555" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">• 实时流动性估算和价格计算</text>
    <text x="50" y="570" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">• 自动代币授权管理和状态追踪</text>
    <text x="400" y="540" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">• 滑点保护和交易截止时间控制</text>
    <text x="400" y="555" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">• 完整的错误处理和用户反馈机制</text>
    <text x="400" y="570" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">• 支持ETH和ERC20代币的流动性操作</text>
  </g>
  
  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
  </defs>
</svg>