<svg width="1000" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 定义渐变色 -->
    <linearGradient id="frontendGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="walletGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="contractGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blockchainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1000" height="800" fill="#F8FAFC" />
  
  <!-- 标题 -->
  <text x="500" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1F2937">
    合约调用序列图 - 添加流动性
  </text>
  
  <!-- 参与者列 -->
  <g id="actors">
    <!-- 前端应用 -->
    <rect x="80" y="70" width="120" height="40" rx="5" fill="url(#frontendGradient)" stroke="#1E40AF" stroke-width="2"/>
    <text x="140" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">前端应用</text>
    
    <!-- Web3钱包 -->
    <rect x="250" y="70" width="120" height="40" rx="5" fill="url(#walletGradient)" stroke="#059669" stroke-width="2"/>
    <text x="310" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Web3钱包</text>
    
    <!-- Router合约 -->
    <rect x="420" y="70" width="120" height="40" rx="5" fill="url(#contractGradient)" stroke="#D97706" stroke-width="2"/>
    <text x="480" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Router合约</text>
    
    <!-- Factory合约 -->
    <rect x="590" y="70" width="120" height="40" rx="5" fill="url(#contractGradient)" stroke="#D97706" stroke-width="2"/>
    <text x="650" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Factory合约</text>
    
    <!-- Pair合约 -->
    <rect x="760" y="70" width="120" height="40" rx="5" fill="url(#contractGradient)" stroke="#D97706" stroke-width="2"/>
    <text x="820" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Pair合约</text>
  </g>
  
  <!-- 生命线 -->
  <g stroke="#9CA3AF" stroke-width="2" stroke-dasharray="5,5">
    <line x1="140" y1="110" x2="140" y2="750"/>
    <line x1="310" y1="110" x2="310" y2="750"/>
    <line x1="480" y1="110" x2="480" y2="750"/>
    <line x1="650" y1="110" x2="650" y2="750"/>
    <line x1="820" y1="110" x2="820" y2="750"/>
  </g>
  
  <!-- 序列步骤 -->
  <g id="sequence-steps">
    <!-- 1. 查询交易对 -->
    <rect x="10" y="140" width="30" height="20" rx="3" fill="#EF4444" stroke="#DC2626"/>
    <text x="25" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">1</text>
    
    <path d="M 140 150 L 650 150" stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="395" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">getPair(tokenA, tokenB)</text>
    
    <path d="M 650 170 L 140 170" stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
    <text x="395" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">返回交易对地址</text>
    
    <!-- 2. 获取储备量 (如果存在) -->
    <rect x="10" y="190" width="30" height="20" rx="3" fill="#EF4444" stroke="#DC2626"/>
    <text x="25" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">2</text>
    
    <path d="M 140 200 L 820 200" stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="480" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">getReserves() (如果交易对存在)</text>
    
    <path d="M 820 220 L 140 220" stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
    <text x="480" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">返回 reserve0, reserve1, timestamp</text>
    
    <!-- 3. 计算流动性估算 -->
    <rect x="10" y="240" width="30" height="20" rx="3" fill="#EF4444" stroke="#DC2626"/>
    <text x="25" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">3</text>
    
    <rect x="100" y="240" width="80" height="30" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="140" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400E">本地计算</text>
    <text x="140" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#92400E">流动性参数</text>
    
    <!-- 4. 检查代币授权 -->
    <rect x="10" y="290" width="30" height="20" rx="3" fill="#EF4444" stroke="#DC2626"/>
    <text x="25" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">4</text>
    
    <path d="M 140 300 L 310 300" stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="225" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">检查代币授权</text>
    
    <path d="M 310 320 L 140 320" stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
    <text x="225" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">allowance数量</text>
    
    <!-- 5a. 授权代币A (如需要) -->
    <rect x="10" y="340" width="30" height="20" rx="3" fill="#10B981" stroke="#059669"/>
    <text x="25" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">5a</text>
    
    <path d="M 140 350 L 310 350" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="225" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#10B981">approve(router, amountA)</text>
    
    <rect x="330" y="360" width="100" height="20" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    <text x="380" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46">等待交易确认</text>
    
    <!-- 5b. 授权代币B (如需要) -->
    <rect x="10" y="390" width="30" height="20" rx="3" fill="#10B981" stroke="#059669"/>
    <text x="25" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">5b</text>
    
    <path d="M 140 400 L 310 400" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="225" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#10B981">approve(router, amountB)</text>
    
    <rect x="330" y="410" width="100" height="20" rx="3" fill="#D1FAE5" stroke="#10B981" stroke-width="1"/>
    <text x="380" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46">等待交易确认</text>
    
    <!-- 6. 添加流动性 -->
    <rect x="10" y="450" width="30" height="20" rx="3" fill="#8B5CF6" stroke="#7C3AED"/>
    <text x="25" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">6</text>
    
    <path d="M 140 460 L 310 460" stroke="#8B5CF6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <text x="225" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B5CF6">addLiquidity()</text>
    
    <path d="M 310 480 L 480 480" stroke="#8B5CF6" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <text x="395" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B5CF6">addLiquidity(...args)</text>
    
    <!-- 7. Router内部逻辑 -->
    <rect x="10" y="500" width="30" height="20" rx="3" fill="#F59E0B" stroke="#D97706"/>
    <text x="25" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">7</text>
    
    <rect x="440" y="500" width="80" height="40" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <text x="480" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400E">_addLiquidity()</text>
    <text x="480" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#92400E">计算最优数量</text>
    
    <!-- 8. 创建交易对 (如不存在) -->
    <rect x="10" y="560" width="30" height="20" rx="3" fill="#F59E0B" stroke="#D97706"/>
    <text x="25" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">8</text>
    
    <path d="M 480 570 L 650 570" stroke="#F59E0B" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="565" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F59E0B">createPair() (如不存在)</text>
    
    <path d="M 650 590 L 820 590" stroke="#F59E0B" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="735" y="585" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F59E0B">部署新Pair合约</text>
    
    <!-- 9. 转账代币到Pair -->
    <rect x="10" y="610" width="30" height="20" rx="3" fill="#F59E0B" stroke="#D97706"/>
    <text x="25" y="625" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">9</text>
    
    <path d="M 480 620 L 820 620" stroke="#F59E0B" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="650" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F59E0B">transferFrom(user, pair, amounts)</text>
    
    <!-- 10. 铸造LP代币 -->
    <rect x="10" y="650" width="30" height="20" rx="3" fill="#F59E0B" stroke="#D97706"/>
    <text x="25" y="665" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">10</text>
    
    <path d="M 480 660 L 820 660" stroke="#F59E0B" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <text x="650" y="655" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">mint(to)</text>
    
    <rect x="750" y="670" width="140" height="30" rx="3" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <text x="820" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400E">计算并铸造LP代币</text>
    <text x="820" y="695" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#92400E">更新储备量</text>
    
    <!-- 11. 返回结果 -->
    <rect x="10" y="710" width="30" height="20" rx="3" fill="#8B5CF6" stroke="#7C3AED"/>
    <text x="25" y="725" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">11</text>
    
    <path d="M 820 720 L 480 720" stroke="#8B5CF6" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
    <text x="650" y="715" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B5CF6">返回 liquidity</text>
    
    <path d="M 480 740 L 310 740" stroke="#8B5CF6" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
    <text x="395" y="735" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B5CF6">返回 (amountA, amountB, liquidity)</text>
    
    <path d="M 310 760 L 140 760" stroke="#8B5CF6" stroke-width="3" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="3,3"/>
    <text x="225" y="755" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B5CF6">交易成功确认</text>
  </g>
  
  <!-- 关键信息框 -->
  <g id="info-boxes">
    <!-- Gas费用信息 -->
    <rect x="50" y="780" width="200" height="15" rx="3" fill="#E0E7FF" stroke="#3B82F6" stroke-width="1"/>
    <text x="150" y="792" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1E40AF">总Gas费用: ~150k-200k</text>
    
    <!-- 交易类型说明 -->
    <rect x="280" y="780" width="300" height="15" rx="3" fill="#F0FDF4" stroke="#10B981" stroke-width="1"/>
    <text x="430" y="792" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#059669">支持 ETH+Token 和 Token+Token 两种模式</text>
    
    <!-- 安全提示 -->
    <rect x="610" y="780" width="200" height="15" rx="3" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/>
    <text x="710" y="792" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#DC2626">包含滑点保护和截止时间</text>
  </g>
  
  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
  </defs>
</svg>