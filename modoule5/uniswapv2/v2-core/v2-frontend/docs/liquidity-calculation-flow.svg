<svg width="900" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 定义渐变色 -->
    <linearGradient id="startGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="processGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decisionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mathGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="resultGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DB2777;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="1000" fill="#F8FAFC" />
  
  <!-- 标题 -->
  <text x="450" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1F2937">
    流动性计算流程图
  </text>
  
  <!-- 开始节点 -->
  <ellipse cx="450" cy="90" rx="80" ry="25" fill="url(#startGradient)" stroke="#059669" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">用户输入代币A数量</text>
  
  <!-- 获取交易对地址 -->
  <rect x="380" y="140" width="140" height="40" rx="5" fill="url(#processGradient)" stroke="#1E40AF" stroke-width="2"/>
  <text x="450" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">查询交易对地址</text>
  <text x="450" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Factory.getPair(A, B)</text>
  
  <!-- 判断交易对是否存在 -->
  <polygon points="450,210 500,240 450,270 400,240" fill="url(#decisionGradient)" stroke="#D97706" stroke-width="2"/>
  <text x="450" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">交易对存在?</text>
  <text x="450" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">(address != 0x0)</text>
  
  <!-- 新交易对分支 -->
  <rect x="150" y="220" width="150" height="60" rx="5" fill="url(#mathGradient)" stroke="#7C3AED" stroke-width="2"/>
  <text x="225" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">新交易对计算</text>
  <text x="225" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• 用户自定义比例</text>
  <text x="225" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• 池子份额 = 100%</text>
  
  <!-- 获取储备量 -->
  <rect x="380" y="320" width="140" height="40" rx="5" fill="url(#processGradient)" stroke="#1E40AF" stroke-width="2"/>
  <text x="450" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">获取池子储备量</text>
  <text x="450" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Pair.getReserves()</text>
  
  <!-- 确定代币顺序 -->
  <rect x="380" y="380" width="140" height="50" rx="5" fill="url(#mathGradient)" stroke="#7C3AED" stroke-width="2"/>
  <text x="450" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">确定代币顺序</text>
  <text x="450" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">token0 = min(addressA, addressB)</text>
  <text x="450" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">(reserveA, reserveB) 排序</text>
  
  <!-- 计算所需代币B数量 -->
  <rect x="350" y="450" width="200" height="70" rx="5" fill="url(#mathGradient)" stroke="#7C3AED" stroke-width="2"/>
  <text x="450" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">计算所需代币B数量</text>
  <text x="450" y="490" text-anchor="middle" font-family="Courier, monospace" font-size="11" fill="white">amountB = amountA</text>
  <text x="450" y="505" text-anchor="middle" font-family="Courier, monospace" font-size="11" fill="white">× reserveB / reserveA</text>
  <text x="450" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">(保持恒定乘积比例)</text>
  
  <!-- 获取LP代币总供应量 -->
  <rect x="380" y="540" width="140" height="40" rx="5" fill="url(#processGradient)" stroke="#1E40AF" stroke-width="2"/>
  <text x="450" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">获取LP总供应量</text>
  <text x="450" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Pair.totalSupply()</text>
  
  <!-- 计算LP代币数量 -->
  <rect x="350" y="600" width="200" height="70" rx="5" fill="url(#mathGradient)" stroke="#7C3AED" stroke-width="2"/>
  <text x="450" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">计算LP代币数量</text>
  <text x="450" y="640" text-anchor="middle" font-family="Courier, monospace" font-size="11" fill="white">liquidity = min(</text>
  <text x="450" y="655" text-anchor="middle" font-family="Courier, monospace" font-size="10" fill="white">  amountA × totalSupply / reserveA,</text>
  <text x="450" y="665" text-anchor="middle" font-family="Courier, monospace" font-size="10" fill="white">  amountB × totalSupply / reserveB</text>
  <text x="450" y="675" text-anchor="middle" font-family="Courier, monospace" font-size="11" fill="white">)</text>
  
  <!-- 计算池子份额 -->
  <rect x="350" y="690" width="200" height="60" rx="5" fill="url(#mathGradient)" stroke="#7C3AED" stroke-width="2"/>
  <text x="450" y="710" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">计算池子份额</text>
  <text x="450" y="730" text-anchor="middle" font-family="Courier, monospace" font-size="11" fill="white">share = amountA</text>
  <text x="450" y="745" text-anchor="middle" font-family="Courier, monospace" font-size="11" fill="white">/ (reserveA + amountA) × 100%</text>
  
  <!-- 显示结果 -->
  <rect x="350" y="770" width="200" height="80" rx="5" fill="url(#resultGradient)" stroke="#DB2777" stroke-width="2"/>
  <text x="450" y="790" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">显示计算结果</text>
  <text x="450" y="810" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• 代币B所需数量</text>
  <text x="450" y="825" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• LP代币获得数量</text>
  <text x="450" y="840" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">• 池子份额百分比</text>
  
  <!-- 实时更新 -->
  <ellipse cx="450" cy="890" rx="80" ry="25" fill="url(#processGradient)" stroke="#1E40AF" stroke-width="2"/>
  <text x="450" y="895" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">实时更新显示</text>
  
  <!-- 流程箭头 -->
  <g stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)">
    <!-- 主流程 -->
    <path d="M 450 115 L 450 140"/>
    <path d="M 450 180 L 450 210"/>
    <path d="M 450 270 L 450 320"/>
    <path d="M 450 360 L 450 380"/>
    <path d="M 450 430 L 450 450"/>
    <path d="M 450 520 L 450 540"/>
    <path d="M 450 580 L 450 600"/>
    <path d="M 450 670 L 450 690"/>
    <path d="M 450 750 L 450 770"/>
    <path d="M 450 850 L 450 865"/>
    
    <!-- 新交易对分支 -->
    <path d="M 400 240 L 300 240"/>
    <path d="M 225 280 L 225 320 L 400 320 L 400 240"/>
  </g>
  
  <!-- 流程标签 -->
  <g font-family="Arial, sans-serif" font-size="10" fill="#6B7280">
    <text x="330" y="250">否(新池)</text>
    <text x="470" y="290">是</text>
  </g>
  
  <!-- 数学公式详解 -->
  <g id="math-details">
    <rect x="600" y="200" width="280" height="350" rx="5" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="740" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0369A1">数学公式详解</text>
    
    <!-- 基本原理 -->
    <text x="610" y="245" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0369A1">1. 恒定乘积原理</text>
    <text x="620" y="260" font-family="Courier, monospace" font-size="11" fill="#0F172A">x × y = k (常数)</text>
    <text x="620" y="275" font-family="Arial, sans-serif" font-size="10" fill="#64748B">添加流动性必须保持此比例</text>
    
    <!-- 代币B计算 -->
    <text x="610" y="300" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0369A1">2. 代币B数量计算</text>
    <text x="620" y="315" font-family="Courier, monospace" font-size="11" fill="#0F172A">amountB = amountA × reserveB / reserveA</text>
    <text x="620" y="330" font-family="Arial, sans-serif" font-size="10" fill="#64748B">按当前池子比例计算</text>
    
    <!-- LP代币计算 -->
    <text x="610" y="355" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0369A1">3. LP代币计算 (首次)</text>
    <text x="620" y="370" font-family="Courier, monospace" font-size="11" fill="#0F172A">liquidity = √(amountA × amountB) - 1000</text>
    <text x="620" y="385" font-family="Arial, sans-serif" font-size="10" fill="#64748B">几何平均数，减去最小流动性</text>
    
    <!-- LP代币计算 -->
    <text x="610" y="410" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0369A1">4. LP代币计算 (后续)</text>
    <text x="620" y="425" font-family="Courier, monospace" font-size="10" fill="#0F172A">liquidity = min(</text>
    <text x="630" y="440" font-family="Courier, monospace" font-size="10" fill="#0F172A">  amountA × totalSupply / reserveA,</text>
    <text x="630" y="455" font-family="Courier, monospace" font-size="10" fill="#0F172A">  amountB × totalSupply / reserveB</text>
    <text x="620" y="470" font-family="Courier, monospace" font-size="10" fill="#0F172A">)</text>
    <text x="620" y="485" font-family="Arial, sans-serif" font-size="10" fill="#64748B">取两者最小值，防止套利</text>
    
    <!-- 池子份额计算 -->
    <text x="610" y="510" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0369A1">5. 池子份额计算</text>
    <text x="620" y="525" font-family="Courier, monospace" font-size="11" fill="#0F172A">share = liquidity / (totalSupply + liquidity)</text>
    <text x="620" y="540" font-family="Arial, sans-serif" font-size="10" fill="#64748B">新LP代币占总供应量的比例</text>
  </g>
  
  <!-- 实现细节 -->
  <g id="implementation-details">
    <rect x="50" y="320" width="280" height="300" rx="5" fill="#FEF7CD" stroke="#F59E0B" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="190" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#92400E">前端实现细节</text>
    
    <!-- Hook使用 -->
    <text x="60" y="365" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400E">1. React Hooks</text>
    <text x="70" y="380" font-family="Courier, monospace" font-size="10" fill="#78350F">useLiquidityEstimate(tokenA, tokenB, amountA)</text>
    <text x="70" y="395" font-family="Arial, sans-serif" font-size="10" fill="#78350F">实时响应用户输入变化</text>
    
    <!-- 合约调用 -->
    <text x="60" y="420" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400E">2. 合约调用</text>
    <text x="70" y="435" font-family="Courier, monospace" font-size="10" fill="#78350F">useReadContract: getPair, getReserves, totalSupply</text>
    <text x="70" y="450" font-family="Arial, sans-serif" font-size="10" fill="#78350F">并行查询提升性能</text>
    
    <!-- 精度处理 -->
    <text x="60" y="475" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400E">3. 精度处理</text>
    <text x="70" y="490" font-family="Courier, monospace" font-size="10" fill="#78350F">parseTokenAmount() / formatTokenAmount()</text>
    <text x="70" y="505" font-family="Arial, sans-serif" font-size="10" fill="#78350F">BigInt避免精度丢失</text>
    
    <!-- 错误处理 -->
    <text x="60" y="530" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400E">4. 错误处理</text>
    <text x="70" y="545" font-family="Arial, sans-serif" font-size="10" fill="#78350F">• 除零错误检查</text>
    <text x="70" y="560" font-family="Arial, sans-serif" font-size="10" fill="#78350F">• 溢出保护</text>
    <text x="70" y="575" font-family="Arial, sans-serif" font-size="10" fill="#78350F">• 网络错误重试</text>
    
    <!-- 缓存优化 -->
    <text x="60" y="600" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400E">5. 性能优化</text>
    <text x="70" y="615" font-family="Arial, sans-serif" font-size="10" fill="#78350F">• query.enabled 条件查询</text>
    <text x="70" y="630" font-family="Arial, sans-serif" font-size="10" fill="#78350F">• 防抖动用户输入</text>
  </g>
  
  <!-- 边界情况说明 -->
  <g id="edge-cases">
    <rect x="600" y="580" width="280" height="200" rx="5" fill="#FEE2E2" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="740" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#991B1B">边界情况处理</text>
    
    <text x="610" y="625" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991B1B">1. 新交易对</text>
    <text x="620" y="640" font-family="Arial, sans-serif" font-size="10" fill="#7F1D1D">• 无储备量数据</text>
    <text x="620" y="655" font-family="Arial, sans-serif" font-size="10" fill="#7F1D1D">• 用户设定初始比例</text>
    <text x="620" y="670" font-family="Arial, sans-serif" font-size="10" fill="#7F1D1D">• 池子份额 100%</text>
    
    <text x="610" y="695" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991B1B">2. 极小数量</text>
    <text x="620" y="710" font-family="Arial, sans-serif" font-size="10" fill="#7F1D1D">• 精度损失检查</text>
    <text x="620" y="725" font-family="Arial, sans-serif" font-size="10" fill="#7F1D1D">• 最小流动性限制</text>
    
    <text x="610" y="750" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#991B1B">3. 网络错误</text>
    <text x="620" y="765" font-family="Arial, sans-serif" font-size="10" fill="#7F1D1D">• 显示默认值</text>
    <text x="620" y="780" font-family="Arial, sans-serif" font-size="10" fill="#7F1D1D">• 错误日志记录</text>
  </g>
  
  <!-- 性能指标 -->
  <rect x="50" y="900" width="800" height="40" rx="5" fill="#F1F5F9" stroke="#64748B" stroke-width="2"/>
  <text x="450" y="920" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#334155">性能指标</text>
  <text x="100" y="935" font-family="Arial, sans-serif" font-size="12" fill="#475569">计算延迟: &lt;10ms</text>
  <text x="300" y="935" font-family="Arial, sans-serif" font-size="12" fill="#475569">RPC调用: 3-4次</text>
  <text x="500" y="935" font-family="Arial, sans-serif" font-size="12" fill="#475569">更新频率: 实时</text>
  <text x="700" y="935" font-family="Arial, sans-serif" font-size="12" fill="#475569">精度: 18位小数</text>
  
  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
  </defs>
</svg>