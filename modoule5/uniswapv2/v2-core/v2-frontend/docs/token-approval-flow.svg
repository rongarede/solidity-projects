<svg width="800" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 定义渐变色 -->
    <linearGradient id="startGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="processGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="decisionGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="errorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="successGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="900" fill="#F8FAFC" />
  
  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1F2937">
    ERC20 代币授权流程
  </text>
  
  <!-- 开始节点 -->
  <ellipse cx="400" cy="90" rx="80" ry="25" fill="url(#startGradient)" stroke="#059669" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">检查代币授权</text>
  
  <!-- 判断是否为ETH -->
  <polygon points="400,140 450,170 400,200 350,170" fill="url(#decisionGradient)" stroke="#D97706" stroke-width="2"/>
  <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">是ETH代币?</text>
  
  <!-- ETH无需授权 -->
  <rect x="150" y="150" width="120" height="40" rx="5" fill="url(#successGradient)" stroke="#7C3AED" stroke-width="2"/>
  <text x="210" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">ETH无需授权</text>
  <text x="210" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">直接继续</text>
  
  <!-- 获取当前授权额度 -->
  <rect x="340" y="240" width="120" height="40" rx="5" fill="url(#processGradient)" stroke="#1E40AF" stroke-width="2"/>
  <text x="400" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">获取当前授权额度</text>
  <text x="400" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">allowance(user, router)</text>
  
  <!-- 比较授权额度 -->
  <polygon points="400,310 450,340 400,370 350,340" fill="url(#decisionGradient)" stroke="#D97706" stroke-width="2"/>
  <text x="400" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">当前授权 ≥</text>
  <text x="400" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">需要数量?</text>
  
  <!-- 授权足够 -->
  <rect x="150" y="320" width="120" height="40" rx="5" fill="url(#successGradient)" stroke="#7C3AED" stroke-width="2"/>
  <text x="210" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">授权额度足够</text>
  <text x="210" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">无需重新授权</text>
  
  <!-- 需要授权 -->
  <rect x="340" y="410" width="120" height="40" rx="5" fill="url(#processGradient)" stroke="#1E40AF" stroke-width="2"/>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">发起授权交易</text>
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">approve(router, amount)</text>
  
  <!-- 显示授权按钮 -->
  <rect x="340" y="480" width="120" height="40" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400E">UI显示:</text>
  <text x="400" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400E">"Approve TokenX"</text>
  
  <!-- 用户确认授权 -->
  <polygon points="400,550 450,580 400,610 350,580" fill="url(#decisionGradient)" stroke="#D97706" stroke-width="2"/>
  <text x="400" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">用户确认授权?</text>
  
  <!-- 用户拒绝 -->
  <rect x="580" y="560" width="120" height="40" rx="5" fill="url(#errorGradient)" stroke="#DC2626" stroke-width="2"/>
  <text x="640" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">用户拒绝</text>
  <text x="640" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">流程终止</text>
  
  <!-- 等待交易确认 -->
  <rect x="340" y="650" width="120" height="40" rx="5" fill="url(#processGradient)" stroke="#1E40AF" stroke-width="2"/>
  <text x="400" y="670" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">等待区块确认</text>
  <text x="400" y="685" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">~2-5秒</text>
  
  <!-- 授权状态检查 -->
  <polygon points="400,720 450,750 400,780 350,750" fill="url(#decisionGradient)" stroke="#D97706" stroke-width="2"/>
  <text x="400" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">授权成功?</text>
  
  <!-- 授权失败 -->
  <rect x="580" y="730" width="120" height="40" rx="5" fill="url(#errorGradient)" stroke="#DC2626" stroke-width="2"/>
  <text x="640" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">授权失败</text>
  <text x="640" y="765" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">显示错误</text>
  
  <!-- 授权成功 -->
  <ellipse cx="400" cy="830" rx="80" ry="25" fill="url(#successGradient)" stroke="#7C3AED" stroke-width="2"/>
  <text x="400" y="835" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">授权完成</text>
  
  <!-- 流程箭头 -->
  <g stroke="#4B5563" stroke-width="2" fill="none" marker-end="url(#arrowhead)">
    <!-- 主流程 -->
    <path d="M 400 115 L 400 140"/>
    <path d="M 400 200 L 400 240"/>
    <path d="M 400 280 L 400 310"/>
    <path d="M 400 370 L 400 410"/>
    <path d="M 400 450 L 400 480"/>
    <path d="M 400 520 L 400 550"/>
    <path d="M 400 610 L 400 650"/>
    <path d="M 400 690 L 400 720"/>
    <path d="M 400 780 L 400 805"/>
    
    <!-- 分支流程 -->
    <path d="M 350 170 L 210 170"/>
    <path d="M 210 190 L 210 220 L 350 220 L 350 170"/>
    
    <path d="M 350 340 L 210 340"/>
    <path d="M 210 360 L 210 390 L 350 390 L 350 340"/>
    
    <path d="M 450 580 L 640 580"/>
    <path d="M 640 600 L 640 620 L 450 620 L 450 580"/>
    
    <path d="M 450 750 L 640 750"/>
    <path d="M 640 770 L 640 790 L 450 790 L 450 750"/>
  </g>
  
  <!-- 流程标签 -->
  <g font-family="Arial, sans-serif" font-size="10" fill="#6B7280">
    <text x="280" y="180">是</text>
    <text x="430" y="210">否</text>
    <text x="280" y="350">是</text>
    <text x="430" y="380">否</text>
    <text x="530" y="590">否</text>
    <text x="430" y="620">是</text>
    <text x="530" y="760">否</text>
    <text x="430" y="790">是</text>
  </g>
  
  <!-- 技术细节说明 -->
  <g id="technical-details">
    <rect x="50" y="120" width="200" height="180" rx="5" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="150" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0369A1">技术实现细节</text>
    
    <text x="60" y="160" font-family="Arial, sans-serif" font-size="11" fill="#0369A1">• 使用 useTokenAllowance Hook</text>
    <text x="60" y="175" font-family="Arial, sans-serif" font-size="11" fill="#0369A1">• 调用 ERC20.allowance()</text>
    <text x="60" y="190" font-family="Arial, sans-serif" font-size="11" fill="#0369A1">• 比较 amount vs allowance</text>
    <text x="60" y="205" font-family="Arial, sans-serif" font-size="11" fill="#0369A1">• 使用 writeContract Hook</text>
    <text x="60" y="220" font-family="Arial, sans-serif" font-size="11" fill="#0369A1">• approve(spender, amount)</text>
    <text x="60" y="235" font-family="Arial, sans-serif" font-size="11" fill="#0369A1">• 监听交易状态</text>
    <text x="60" y="250" font-family="Arial, sans-serif" font-size="11" fill="#0369A1">• 自动刷新 allowance</text>
    <text x="60" y="265" font-family="Arial, sans-serif" font-size="11" fill="#0369A1">• 智能按钮状态更新</text>
    <text x="60" y="280" font-family="Arial, sans-serif" font-size="11" fill="#0369A1">• 错误处理和重试</text>
  </g>
  
  <!-- 关键数据说明 -->
  <g id="data-info">
    <rect x="550" y="120" width="200" height="150" rx="5" fill="#FEF7CD" stroke="#F59E0B" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="650" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400E">关键数据</text>
    
    <text x="560" y="160" font-family="Arial, sans-serif" font-size="11" fill="#92400E">• Router地址:</text>
    <text x="570" y="175" font-family="Arial, sans-serif" font-size="10" fill="#78350F">0xcEc7...bC72</text>
    
    <text x="560" y="195" font-family="Arial, sans-serif" font-size="11" fill="#92400E">• 授权数量策略:</text>
    <text x="570" y="210" font-family="Arial, sans-serif" font-size="10" fill="#78350F">精确数量 vs 无限授权</text>
    
    <text x="560" y="230" font-family="Arial, sans-serif" font-size="11" fill="#92400E">• Gas费用:</text>
    <text x="570" y="245" font-family="Arial, sans-serif" font-size="10" fill="#78350F">~50k gas per approve</text>
    
    <text x="560" y="265" font-family="Arial, sans-serif" font-size="11" fill="#92400E">• 安全考虑:</text>
    <text x="570" y="280" font-family="Arial, sans-serif" font-size="10" fill="#78350F">避免授权过大数量</text>
  </g>
  
  <!-- UI状态说明 -->
  <g id="ui-states">
    <rect x="50" y="460" width="250" height="120" rx="5" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="175" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7C3AED">UI状态变化</text>
    
    <text x="60" y="500" font-family="Arial, sans-serif" font-size="11" fill="#7C3AED">1. 初始状态: "Approve TokenX"</text>
    <text x="60" y="515" font-family="Arial, sans-serif" font-size="11" fill="#7C3AED">2. 点击后: "Approving..."</text>
    <text x="60" y="530" font-family="Arial, sans-serif" font-size="11" fill="#7C3AED">3. 等待中: "Confirming..."</text>
    <text x="60" y="545" font-family="Arial, sans-serif" font-size="11" fill="#7C3AED">4. 成功后: "TokenX Approved ✓"</text>
    <text x="60" y="560" font-family="Arial, sans-serif" font-size="11" fill="#7C3AED">5. 最终状态: "Add Liquidity"</text>
  </g>
  
  <!-- 代码示例 -->
  <g id="code-example">
    <rect x="350" y="860" width="400" height="30" rx="3" fill="#1F2937" stroke="#374151" stroke-width="1"/>
    <text x="550" y="875" text-anchor="middle" font-family="Courier, monospace" font-size="10" fill="#10B981">
      await approveToken(token, ROUTER_ADDRESS, amount)
    </text>
    <text x="550" y="885" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9CA3AF">
      核心授权调用代码
    </text>
  </g>
  
  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
  </defs>
</svg>